<!DOCTYPE html>
<html>
	<head>
		<title>
			Wikimedia UCoC quiz
		</title>
		<meta charset="utf-8">
		<style>
			body, button {
				font-family: 'Verdana';
			}
			button {
				background-color: black;
				color: white;
				border: 0px;
				border-radius: 5pt;
				width: 20%;
				padding: 5pt;
			}
		</style>
	</head>
	<body>
		<h1 style="text-align: center;">
			Wikimedia UCoC quiz
		</h1>
		<div id="quiz">
			
		</div>
		<script>
			var corrs = [];
			var answers = [];
		</script>
		<script id="gen">
			var quest = 0;
			function question(q, a) {
				var choice;
				answers.push("");
				document.getElementById("quiz").innerHTML += `
					<p>
						${q}
					</p>
				`;
				corrs.push(a[0]);
				for(let i = 0; i < 4; i++) {
					choice = Math.floor(Math.random() * a.length);
					document.getElementById("quiz").innerHTML += `
						<button style="background-color: hsv(${40 * i}, 100, 50);" onclick="answers[${quest}] = '${a[choice]}';">
							${a[choice]}
						</button>
					`;
					a = a.slice(0, choice).concat(a.slice(choice + 1));
					console.log(a);
				}
				quest++;
			}
			question("Lorem ipsum dolor sit amet...", ["Answer 1", "Ajraddatz", "BRPever", "Ghilt"]);
			document.getElementById("gen").innerHTML = "";
		</script>
	</body>
</html>
