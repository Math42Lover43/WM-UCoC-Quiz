<!DOCTYPE html>
<html>
	<head>
		<title>
			Wikimedia UCoC quiz
		</title>
		<meta charset="utf-8">
		<style>
			body, button {
				font-family: 'Verdana';
			}
			button {
				background-color: black;
				color: white;
				border: 0px;
				border-radius: 5pt;
				padding: 5pt;
			}
		</style>
	</head>
	<body>
		<h1 style="text-align: center;">
			Wikimedia UCoC quiz
		</h1>
		<div id="quiz">
			
		</div>
		<hr/>
		<div style="text-align: center;">
			<button onclick="check();">
				Check answers
			</button>
		</div>
		<script>
			function check() {
				var corr = 0;
				for(let insp = 0; insp < corrs.length; insp++) {
					corr += corrs[insp] == answers[insp];
					console.log(corrs[insp], answers[insp])
				}
				document.body.innerHTML = `
					<h1>
						Your likelihood of UCoC compliance is <span style="color: hsl(${120 * corr / corrs.length}, 100%, 40%);">${Math.round(100 * corr / corrs.length)}%</span>
					</h1>
				`;
			}
		</script>
		<script id="gen">
			var corrs = [];
			var answers = [];
			var quest = 0;
			function question(q, a) {
				var choice;
				var then;
				var colors = [];
				var col;
				answers.push("");
				document.getElementById("quiz").innerHTML += `
					<p>
						${q}
					</p>
				`;
				corrs.push(a[0]);
				then = a.length;
				for(let i = 0; i < then; i++) {
					colors.push(120 / (then - 1) * i);
				}
				for(let i = 0; i < then; i++) {
					choice = Math.floor(Math.random() * a.length);
					col = Math.floor(Math.random() * colors.length);
					document.getElementById("quiz").innerHTML += `
						<button style="background-color: hsl(${colors[col]}, 100%, 25%); width: ${90 / then}%" id="quest${quest}choice${i}" onclick="answers[${quest}] = '${a[choice]}'; for(let i = 0; i < ${then}; i++) { document.getElementById('quest${quest}choice' + i).innerHTML = document.getElementById('quest${quest}choice' + i).innerHTML.replaceAll(/<\\\/?b>/g, ''); } document.getElementById('quest${quest}choice${i}').innerHTML = '<b>' + document.getElementById('quest${quest}choice${i}').innerHTML + '</b>';">
							${a[choice]}
						</button>
					`;
					a = a.slice(0, choice).concat(a.slice(choice + 1));
					colors = colors.slice(0, col).concat(colors.slice(col + 1));
				}
				quest++;
			}
			question("Someone imports their grievances with another user from a first wiki to your wiki, manufactures an unrelated content dispute with them, and takes all of this to a noticeboard, so you block them for hounding. Later, they start an RfC on Meta about the same issue because the first two wikis failed to provide meaningful resolution. How do you respond?", ["Provide insights into the issue and comfort for the blocked user and give guidance or neutrally tell them to disengage", "Dismiss their concerns using belittling language and claim that they are doing themselves a favor", "Dismiss their concerns as hounding, harassment, or similar", "Tell them not to respond even if similar incidents arise in the future", "Dismiss their complaint simply because the behavior they take issue with is not blockable"]);
			question("Someone alleges being targeted by another user across multiple wikis. As an administrator of one of the involved wikis, how do you respond?", ["Consider their concerns as if they were in isolation before also considering what happened on the other wikis", "Speedily block them for their cross-wiki behavior without considering their concerns", "Make unfounded accusations (cast aspersions) against either party", "Attack them for raising their concerns", "Speedily tell them to drop the matter entirely even if nobody has provided insight into the matter"]);
			question("Someone attempts to reassure someone who was treated bluntly about the same matter, such as by providing a supportive message. What do you do?", ["Apologize to the reassured user and thank the user who attempted to reassure them", "Revert the supportive behavior and/or take or threaten action against them for doing so", "Prioritize the application of policies against disruptive behavior such as sockpuppetry to undo the edits in question", "Threaten or otherwise attack the supporter for providing support"]);
			question("How do you relitigate or discuss a matter with someone who was sanctioned and has a viewpoint that differs from yours or another authority figure's?", ["Show acknowledgement for their stance and avoid making unfounded assumptions (casting aspersions) about them", "Speedily dismiss their concerns and indicate to them that they need to disengage altogether whether acknowledgement has been shown or not", "Sanction them or decline their unblock request merely for expressing their differing point of view", "Hide the revisions of them expressing their point as grossly offensive, insulting, or similar terms when they in fact do not look offensive"]);
			question("When you make assumptions about another user's behavior being in bad faith or in a certain manner, what must you do as well?", ["Always supply evidence to make your point clear and avoid synthesizing the evidence to form a statement supported by none of them", "Choose not to provide evidence whether it has already been supplied or not", "Make assumptions/accusations regardless of whether evidence exists to prove that", "Fabricate fake evidence and use that to support your point", "Use literal interpretations of policy instead of real evidence to form your statement"]);
			question("Someone expresses their concerns about your conduct directly with you. How do you respond?", ["Try to understand their perspective and explain yours nicely", "Threaten sanctions on them for challenging you", "Label them challenging you as harassment or stalking (unless this is clear, then support evidence)", "Unfoundedly accuse them of misbehavior (cast aspersions on them)", "Use literal interpretations of policy to shut their argument down", "Deliberately do nothing"]);
			question("Someone who is involved in a matter asks you, a currently uninvolved user, to take authoritative action. How do you respond?", ["Use all the evidence provided and neutrally judge the matter before deciding what to do, asking questions as necessary", "Blindly follow their recommendation and give them the benefit of the doubt", "Only consider the requester\'s side when deciding to take action"]);
			document.getElementById("gen").innerHTML = "";
		</script>
	</body>
</html>
